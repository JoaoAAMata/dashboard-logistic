<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEA NOOS Sales Dashboard 2026</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --hdr:#1a2e20;
  --hdr-tbl:#162820;
  --bg:#f5f5f3;
  --surface:#fff;
  --border:rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.16);
  --text:#1a1a18;
  --muted:#6b6b66;
  --orange:#c88a00;
  --green:#1a7a00;
  --red:#c02020;
  --subtotal:#e8f5ee;
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Header bar ── */
.hdr{background:var(--hdr);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.hdr-left{display:flex;flex-direction:column;gap:2px}
.hdr-title{font-size:15px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.hdr-sub{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-badge{font-size:11px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:99px;color:rgba(255,255,255,.8)}
.hdr-btn{font-size:11px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;text-decoration:none;transition:background .15s;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.2)}

/* ── Main ── */
.main{max-width:1500px;margin:0 auto;padding:22px 20px;display:flex;flex-direction:column;gap:20px}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kpi-card{background:var(--surface);border-radius:var(--radius);box-shadow:0 1px 6px rgba(0,0,0,.07);padding:20px 24px}
.kpi-card.dark{background:var(--hdr);color:#fff}
.kpi-label{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.kpi-card.dark .kpi-label{color:rgba(255,255,255,.5)}
.kpi-value{font-size:2.2rem;font-weight:800;line-height:1.1}
.kpi-sub{font-size:.78rem;font-weight:600;margin-top:6px}
.kpi-sub.orange{color:var(--orange)}
.kpi-sub.green{color:var(--green)}
.kpi-card.dark .kpi-sub.green{color:#4fd080}

/* ── Section header ── */
.sec-hdr{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:10px}

/* ── Tables general ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:0 1px 6px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;background:var(--surface);font-size:.8rem}
thead th{background:var(--hdr-tbl);color:#fff;padding:8px 10px;text-align:right;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08)}
thead th:first-child{text-align:left;min-width:140px}
thead th.center{text-align:center}
tbody td{padding:7px 10px;border-bottom:.5px solid var(--border);text-align:right;white-space:nowrap;border-right:.5px solid rgba(0,0,0,.05)}
tbody td:first-child{text-align:left;font-weight:500;border-right:1px solid rgba(0,0,0,.08)}
tbody tr:hover{background:#fafaf8}
tr.bold td{font-weight:700}
tr.subtotal{background:var(--subtotal)}
tr.subtotal td{font-weight:700}
tr.grand-total td{background:var(--hdr);color:#fff;font-weight:700}
tr.orange-row td{color:var(--orange);font-weight:600}
tr.green-row td{color:var(--green);font-weight:600}

/* ── Span header rows ── */
thead tr.span-hdr th{background:#0f1e14;font-size:.7rem;text-align:center;padding:6px 4px;border-right:1px solid rgba(255,255,255,.1)}
thead tr.span-hdr th:first-child{text-align:left}
thead tr.week-hdr th{font-size:.65rem;padding:5px 6px}

/* ── Type badges ── */
.badge-sac{display:inline-block;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:4px;background:#fff3e0;color:#c88a00}
.badge-out{display:inline-block;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:4px;background:#e0f5ee;color:#0f7a55}

/* ── Positive / negative ── */
.pos{color:var(--green)}
.neg{color:var(--red)}
.na{color:#bbb}

/* ── Loading / error states ── */
#loading-msg{padding:40px;text-align:center;color:var(--muted)}
#error-msg{padding:40px;text-align:center;color:var(--red);display:none}

/* ── Responsive ── */
@media(max-width:700px){.kpi-row{grid-template-columns:1fr}.hdr{padding:12px 16px}.main{padding:14px 10px}}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">SEA NOOS SALES DASHBOARD 2026</div>
    <div class="hdr-sub">Year-to-date performance overview</div>
  </div>
  <div class="hdr-right">
    <span class="date-badge" id="date-badge"></span>
    <a class="hdr-btn" href="/reports">← Hub</a>
    <button class="hdr-btn" onclick="restoreTotals()">⟳ Restore Totals</button>
  </div>
</div>

<div class="main" id="main-content">
  <div id="loading-msg">Loading NOOS sales data…</div>
  <div id="error-msg"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTHS_FULL = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

function fmt(n){
  if(n==null||isNaN(n)) return '—';
  return n.toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtRM(n){
  if(n==null||isNaN(n)||n===0) return '—';
  return 'RM '+n.toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtPct(n){
  if(n==null||isNaN(n)) return '—';
  return (n*100).toFixed(1)+'%';
}
function fmtLfl(n){
  if(n==null||isNaN(n)||!isFinite(n)) return '<span class="na">—</span>';
  const pct = (n*100).toFixed(1)+'%';
  if(n>0) return `<span class="pos">▲ ${pct}</span>`;
  if(n<0) return `<span class="neg">▼ ${Math.abs(n*100).toFixed(1)}%</span>`;
  return `<span class="na">0.0%</span>`;
}
function fmtLflText(n){
  if(n==null||isNaN(n)||!isFinite(n)) return '—';
  const pct = (n*100).toFixed(1)+'%';
  if(n>0) return `▲ ${pct}`;
  if(n<0) return `▼ ${Math.abs(n*100).toFixed(1)}%`;
  return '0.0%';
}

function excelSerialToDate(serial){
  if(!serial||serial<40000) return null;
  return new Date(Math.round((serial-25569)*86400000));
}

function isoWeekYear(d){
  const date = new Date(d); date.setHours(0,0,0,0);
  const thu = new Date(date); thu.setDate(date.getDate()+3-((date.getDay()+6)%7));
  const yearStart = new Date(thu.getFullYear(),0,4);
  return {
    year: thu.getFullYear(),
    week: 1+Math.round(((thu-yearStart)/86400000-3+((yearStart.getDay()+6)%7))/7)
  };
}

function thursdayMonth(d){
  const date = new Date(d);
  const mon = new Date(date); mon.setDate(date.getDate()-((date.getDay()+6)%7));
  const thu = new Date(mon); thu.setDate(mon.getDate()+3);
  return thu.getMonth()+1; // 1-based
}

function normalizeDesign(d){
  if(!d) return d;
  const s = d.trim();
  if(/shirt/i.test(s)&&!/polo/i.test(s)) return 'Shirt Casual';
  if(/chino.*trouser|trouser.*chino/i.test(s)) return 'Trousers Casual';
  if(/bermuda/i.test(s)) return 'Shorts';
  return s;
}

// ─────────────────────────────────────────────────────────────
// Data loading
// ─────────────────────────────────────────────────────────────
let G = {}; // global data store for restoreTotals

async function init(){
  const badge = document.getElementById('date-badge');
  if(badge) badge.textContent = new Date().toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});

  try{
    const resp = await fetch('/noos-sales/data',{credentials:'include'});
    if(resp.status===401){
      showError('Session expired — <a href="/login" style="color:#185FA5">click here to log in again</a> and then return to this dashboard.');
      return;
    }
    if(!resp.ok){
      showError('No NOOS sales data uploaded yet. Please ask an admin to upload the file.');
      return;
    }
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf,{type:'array',cellDates:false});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws,{defval:null});
    processData(raw);
  } catch(e){
    showError('Failed to load NOOS data: '+e.message);
  }
}

function showError(msg){
  document.getElementById('loading-msg').style.display='none';
  const el = document.getElementById('error-msg');
  el.style.display='block';
  el.textContent=msg;
}

// ─────────────────────────────────────────────────────────────
// Data processing
// ─────────────────────────────────────────────────────────────
function processData(raw){
  // Parse rows
  const rows = [];
  for(const r of raw){
    const serial = Number(r['DATE']||r['Date']||r['date']||0);
    const d = excelSerialToDate(serial);
    if(!d) continue;
    const sale = Number(r['SALE']||r['Sale']||r['sale']||0);
    if(sale===0) continue;

    const year = Number(r['YEAR']||r['Year']||r['year']||d.getFullYear());
    const month = d.getMonth()+1; // 1-based
    const type = String(r['TYPE']||r['Type']||r['type']||'').trim().toUpperCase();
    const style = String(r['STYLE']||r['Style']||r['style']||'').trim();
    const design = String(r['DESIGN']||r['Design']||r['design']||'').trim();
    const color = String(r['COLOR']||r['Color']||r['color']||'').trim();
    const qtt = Number(r['QTT']||r['Qty']||r['qty']||r['QTY']||0);
    const family = String(r['FAMILY']||r['Family']||r['family']||'').trim();
    const season = String(r['SEASON']||r['Season']||r['season']||'').trim().toUpperCase();
    const policy = String(r['POLICY']||r['Policy']||r['policy']||'').trim();
    const storet = String(r['STORET']||r['Storet']||r['storet']||'').trim();

    const {week: isoWeek, year: isoYear} = isoWeekYear(d);
    const wkMonth = thursdayMonth(d);

    const isSacoor = type==='SACOOR';
    const isNoos = season==='NOOS';

    rows.push({d,year,month,type,style,design,color,sale,qtt,family,season,policy,storet,
               isoWeek,isoYear,wkMonth,isSacoor,isNoos,serial});
  }

  G.rows = rows;
  buildDashboard(rows);
}

function buildDashboard(rows){
  document.getElementById('loading-msg').style.display='none';

  const CY = 2026;
  const PY = 2025;

  // ── Monthly aggregation ──────────────────────────────────
  // For each year+month: noosSac, noosOut, noosTotal, allTotal
  function aggMonth(yr, mo, key){
    return rows.filter(r=>r.year===yr&&r.month===mo&&(key==='all'||r.isNoos))
               .reduce((s,r)=>{ return s + (key==='sac'?(!r.isSacoor?0:r.sale):key==='out'?(r.isSacoor?0:r.sale):r.sale); },0);
  }
  function allMonth(yr,mo){
    return rows.filter(r=>r.year===yr&&r.month===mo).reduce((s,r)=>s+r.sale,0);
  }

  const monthly = {};
  for(let m=1;m<=12;m++){
    monthly[m] = {
      cy_sac: aggMonth(CY,m,'sac'),
      cy_out: aggMonth(CY,m,'out'),
      cy_noos: aggMonth(CY,m,'noos'),
      cy_all: allMonth(CY,m),
      py_noos: aggMonth(PY,m,'noos'),
      py_all: allMonth(PY,m),
    };
    monthly[m].cy_noos = monthly[m].cy_sac + monthly[m].cy_out;
    monthly[m].noos_pct = monthly[m].cy_all>0 ? monthly[m].cy_noos/monthly[m].cy_all : null;
    monthly[m].lfl = (monthly[m].cy_noos>0||monthly[m].py_noos>0)&&monthly[m].py_noos>0
                     ? (monthly[m].cy_noos/monthly[m].py_noos)-1 : null;
  }

  // Which months have 2026 data?
  const hasData = m => monthly[m].cy_all > 0;
  const activeMonths = MONTHS.map((_,i)=>i+1).filter(hasData);

  // YTD calcs
  const ytd_noos_cy = activeMonths.reduce((s,m)=>s+monthly[m].cy_noos,0);
  const ytd_noos_py = activeMonths.reduce((s,m)=>s+monthly[m].py_noos,0);
  const ytd_all_cy  = activeMonths.reduce((s,m)=>s+monthly[m].cy_all,0);
  const ytd_noos_pct = ytd_all_cy>0 ? ytd_noos_cy/ytd_all_cy : null;
  const ytd_lfl = ytd_noos_py>0 ? (ytd_noos_cy/ytd_noos_py)-1 : null;

  // AVG LFL (average of months that have both py and cy data)
  const lflVals = activeMonths.map(m=>monthly[m].lfl).filter(v=>v!=null&&isFinite(v));
  const avgLfl = lflVals.length>0 ? lflVals.reduce((s,v)=>s+v,0)/lflVals.length : null;

  G.monthly = monthly;
  G.activeMonths = activeMonths;

  // ── Weekly aggregation ──────────────────────────────────
  // Group 2026 and 2025 data by isoYear+isoWeek, store wkMonth
  const wkMap = {}; // key: `${year}_${week}` -> {noos_cy, noos_py, all_cy, all_py, month}
  // Collect all weeks in 2026 that appear
  const weeks2026 = new Set();
  rows.forEach(r=>{
    if(r.isoYear===CY){ weeks2026.add(r.isoWeek); }
  });

  // Build week data
  const weekData = {}; // week -> {noos_cy, all_cy, noos_py, all_py, month}
  rows.forEach(r=>{
    if(r.isoYear===CY){
      const w = r.isoWeek;
      if(!weekData[w]) weekData[w]={noos_cy:0,all_cy:0,noos_py:0,all_py:0,month:r.wkMonth};
      if(r.isNoos) weekData[w].noos_cy+=r.sale;
      weekData[w].all_cy+=r.sale;
    }
    if(r.isoYear===PY){
      // same ISO week -> compare
      const w = r.isoWeek;
      if(!weekData[w]) weekData[w]={noos_cy:0,all_cy:0,noos_py:0,all_py:0,month:r.wkMonth};
      if(r.isNoos) weekData[w].noos_py+=r.sale;
      weekData[w].all_py+=r.sale;
    }
  });

  // Group weeks by month (using 2026 Thursday rule)
  const weeksByMonth = {}; // month -> sorted array of week numbers
  Object.entries(weekData).forEach(([w,d])=>{
    const mo = d.month;
    if(!weeksByMonth[mo]) weeksByMonth[mo]=[];
    if(!weeksByMonth[mo].includes(Number(w))) weeksByMonth[mo].push(Number(w));
  });
  Object.values(weeksByMonth).forEach(arr=>arr.sort((a,b)=>a-b));

  // ── Style aggregation (2026 NOOS) ──────────────────────
  const styleMap = {};
  rows.forEach(r=>{
    if(!r.isNoos) return;
    const key = `${r.style}|${r.design}|${r.color}|${r.type}`;
    if(!styleMap[key]) styleMap[key]={style:r.style,design:r.design,color:r.color,type:r.type,
                                       sale_cy:0,qty_cy:0,sale_all:0,qty_all:0,isSacoor:r.isSacoor};
    styleMap[key].sale_all+=r.sale;
    styleMap[key].qty_all+=r.qtt;
    if(r.year===CY){ styleMap[key].sale_cy+=r.sale; styleMap[key].qty_cy+=r.qtt; }
  });
  const styleArr = Object.values(styleMap);
  const top20cy = [...styleArr].filter(s=>s.sale_cy>0).sort((a,b)=>b.sale_cy-a.sale_cy).slice(0,20);
  const top20all = [...styleArr].sort((a,b)=>b.sale_all-a.sale_all).slice(0,20);
  const totalNoos_cy = styleArr.reduce((s,r)=>s+r.sale_cy,0);
  const totalNoos_all = styleArr.reduce((s,r)=>s+r.sale_all,0);

  // ── Family / Design aggregation ─────────────────────────
  // Group by type (SACOOR/Outlet) + normalizeDesign, for each month
  const famMap = {}; // `${brand}|${normDesign}` -> {isSacoor, months: {m: sale}}
  rows.forEach(r=>{
    if(!r.isNoos||r.year!==CY) return;
    const nd = normalizeDesign(r.design)||r.design;
    const key = `${r.isSacoor?'SAC':'OUT'}|${nd}`;
    if(!famMap[key]) famMap[key]={isSacoor:r.isSacoor,design:nd,months:{}};
    famMap[key].months[r.month] = (famMap[key].months[r.month]||0)+r.sale;
  });
  // Also include Dec 2025 for Jan MoM comparison
  rows.forEach(r=>{
    if(!r.isNoos||r.year!==PY||r.month!==12) return;
    const nd = normalizeDesign(r.design)||r.design;
    const key = `${r.isSacoor?'SAC':'OUT'}|${nd}`;
    if(!famMap[key]) famMap[key]={isSacoor:r.isSacoor,design:nd,months:{}};
    famMap[key].months[0] = (famMap[key].months[0]||0)+r.sale; // 0 = Dec prev year
  });

  // ── Render ───────────────────────────────────────────────
  renderAll({monthly,activeMonths,ytd_noos_cy,ytd_all_cy,ytd_noos_pct,ytd_lfl,avgLfl,
             weekData,weeksByMonth,top20cy,top20all,totalNoos_cy,totalNoos_all,famMap,CY,PY});
}

function renderAll(ctx){
  const {monthly,activeMonths,ytd_noos_cy,ytd_all_cy,ytd_noos_pct,ytd_lfl,avgLfl,
         weekData,weeksByMonth,top20cy,top20all,totalNoos_cy,totalNoos_all,famMap,CY,PY} = ctx;

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // ── KPI Row ─────────────────────────────────────────────
  const kpiDiv = el('div',{class:'kpi-row'});

  const kpi1 = el('div',{class:'kpi-card'});
  kpi1.innerHTML = `<div class="kpi-label">Total Sales YTD</div>
    <div class="kpi-value">RM ${ytd_all_cy.toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
    <div class="kpi-sub orange">NOOS %: ${ytd_noos_pct!=null?fmtPct(ytd_noos_pct):'—'}</div>`;

  const kpi2 = el('div',{class:'kpi-card dark'});
  kpi2.innerHTML = `<div class="kpi-label">NOOS Sales YTD</div>
    <div class="kpi-value">RM ${ytd_noos_cy.toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
    <div class="kpi-sub green">AVG LFL GROWTH: ${avgLfl!=null?fmtLflText(avgLfl):'—'}</div>`;

  kpiDiv.appendChild(kpi1);
  kpiDiv.appendChild(kpi2);
  main.appendChild(kpiDiv);

  // ── Monthly Breakdown ────────────────────────────────────
  main.appendChild(elText('div','MONTHLY BREAKDOWN',{class:'sec-hdr'}));
  const wrap1 = el('div',{class:'tbl-wrap'});
  wrap1.appendChild(buildMonthlyTable(monthly,activeMonths,CY,PY));
  main.appendChild(wrap1);

  // ── Weekly Detail ────────────────────────────────────────
  main.appendChild(elText('div','WEEKLY DETAIL',{class:'sec-hdr'}));
  const wrap2 = el('div',{class:'tbl-wrap'});
  wrap2.appendChild(buildWeeklyTable(weekData,weeksByMonth,CY,PY));
  main.appendChild(wrap2);

  // ── Top 20 Styles 2026 YTD ───────────────────────────────
  main.appendChild(elText('div','TOP 20 STYLES — 2026 YTD',{class:'sec-hdr'}));
  const wrap3 = el('div',{class:'tbl-wrap'});
  wrap3.appendChild(buildStyleTable(top20cy,totalNoos_cy,true,CY));
  main.appendChild(wrap3);

  // ── Top 20 Styles All Time ───────────────────────────────
  main.appendChild(elText('div','TOP 20 STYLES — ALL TIME',{class:'sec-hdr'}));
  const wrap4 = el('div',{class:'tbl-wrap'});
  wrap4.appendChild(buildStyleTable(top20all,totalNoos_all,false,CY));
  main.appendChild(wrap4);

  // ── Monthly by Family ────────────────────────────────────
  main.appendChild(elText('div','MONTHLY SALES BY FAMILY (NOOS 2026)',{class:'sec-hdr'}));
  const wrap5 = el('div',{class:'tbl-wrap'});
  wrap5.appendChild(buildFamilyTable(famMap,activeMonths));
  main.appendChild(wrap5);
}

// ─────────────────────────────────────────────────────────────
// Monthly Breakdown Table
// ─────────────────────────────────────────────────────────────
function buildMonthlyTable(monthly,activeMonths,CY,PY){
  const t = el('table');

  // Header
  const thead = el('thead');
  const hr = el('tr');
  th(hr,'',{style:'min-width:160px'});
  MONTHS.forEach(m=>th(hr,m));
  th(hr,'YTD',{style:'font-weight:800;background:#0f1e14'});
  thead.appendChild(hr);
  t.appendChild(thead);

  const tbody = el('tbody');

  // Rows data
  const ytd_sac = activeMonths.reduce((s,m)=>s+monthly[m].cy_sac,0);
  const ytd_out = activeMonths.reduce((s,m)=>s+monthly[m].cy_out,0);
  const ytd_noos = activeMonths.reduce((s,m)=>s+monthly[m].cy_noos,0);
  const ytd_all  = activeMonths.reduce((s,m)=>s+monthly[m].cy_all,0);
  const ytd_lfl  = (() => {
    const py = activeMonths.reduce((s,m)=>s+monthly[m].py_noos,0);
    return py>0?(ytd_noos/py)-1:null;
  })();
  const ytd_pct  = ytd_all>0?ytd_noos/ytd_all:null;
  const lflMonths= activeMonths.map(m=>monthly[m].lfl).filter(v=>v!=null&&isFinite(v));
  // avgLfl not shown in table – YTD LFL shown instead

  function rowData(key,ytdVal,cls){
    const tr2 = el('tr',cls?{class:cls}:{});
    for(let m=1;m<=12;m++){
      const v = monthly[m][key];
      const hasDat = monthly[m].cy_all>0;
      if(key==='noos_pct'){
        td(tr2, hasDat&&v!=null ? `<span style="color:var(--orange)">${fmtPct(v)}</span>` : '<span class="na">—</span>', {innerHTML:true});
      } else if(key==='lfl'){
        td(tr2, hasDat ? fmtLfl(v) : '<span class="na">—</span>', {innerHTML:true});
      } else {
        td(tr2, hasDat&&v ? fmt(v) : (hasDat?'0':'—'));
      }
    }
    // YTD
    if(key==='noos_pct'){
      td(tr2, ytd_pct!=null?`<span style="color:var(--orange);font-weight:800">${fmtPct(ytd_pct)}</span>`:'—',{innerHTML:true});
    } else if(key==='lfl'){
      td(tr2, fmtLfl(ytd_lfl),{innerHTML:true});
    } else {
      td(tr2, fmt(ytdVal),{style:'font-weight:800'});
    }
    return tr2;
  }

  // Sales Brothers (NOOS, SACOOR)
  const r1 = rowData('cy_sac',ytd_sac);
  td(r1,'Sales Brothers (NOOS)',{},'prepend');
  tbody.appendChild(r1);

  // Sales Outlet
  const r2 = rowData('cy_out',ytd_out);
  td(r2,'Sales Outlet (NOOS)',{},'prepend');
  tbody.appendChild(r2);

  // NOOS Sales (bold)
  const r3 = rowData('cy_noos',ytd_noos,'bold');
  td(r3,'NOOS Sales',{style:'font-weight:800'},'prepend');
  tbody.appendChild(r3);

  // Total Sales
  const r4 = rowData('cy_all',ytd_all);
  td(r4,'Total Sales',{},'prepend');
  tbody.appendChild(r4);

  // NOOS %
  const r5 = rowData('noos_pct',null,'orange-row');
  td(r5,'NOOS %',{style:'font-weight:700'},'prepend');
  tbody.appendChild(r5);

  // LFL Growth
  const r6 = rowData('lfl',null,'green-row');
  td(r6,'LFL Growth',{style:'font-weight:700'},'prepend');
  tbody.appendChild(r6);

  t.appendChild(tbody);
  return t;
}

// ─────────────────────────────────────────────────────────────
// Weekly Detail Table
// ─────────────────────────────────────────────────────────────
function buildWeeklyTable(weekData,weeksByMonth,CY,PY){
  const t = el('table');
  const thead = el('thead');

  // Collect all months that have week data, sorted
  const months = Object.keys(weeksByMonth).map(Number).sort((a,b)=>a-b);
  if(months.length===0){
    const p = el('p'); p.textContent='No weekly data available.'; return p;
  }

  // Row 1: Month names spanning their weeks
  const spanRow = el('tr',{class:'span-hdr'});
  th(spanRow,'',{style:'text-align:left'});
  months.forEach(m=>{
    const weeks = weeksByMonth[m]||[];
    const thEl = el('th');
    thEl.setAttribute('colspan',weeks.length);
    thEl.textContent = MONTHS_FULL[m-1];
    spanRow.appendChild(thEl);
  });
  thead.appendChild(spanRow);

  // Row 2: Week numbers
  const wkRow = el('tr',{class:'week-hdr'});
  th(wkRow,'',{style:'text-align:left'});
  months.forEach(m=>{
    const weeks = weeksByMonth[m]||[];
    weeks.forEach(w=>{
      const thEl = el('th');
      thEl.textContent = `W${w}`;
      wkRow.appendChild(thEl);
    });
  });
  thead.appendChild(wkRow);
  t.appendChild(thead);

  const tbody = el('tbody');

  // Helper: get all weeks in order
  const allWeeks = months.flatMap(m=>weeksByMonth[m]||[]);

  function wkRow2(label,valFn,cls){
    const tr2 = el('tr',cls?{class:cls}:{});
    const lbl = el('td'); lbl.textContent=label; lbl.style.fontWeight='600';
    tr2.appendChild(lbl);
    allWeeks.forEach(w=>{
      const d = weekData[w];
      const tdEl = el('td');
      tdEl.innerHTML = d ? valFn(d,w) : '<span class="na">—</span>';
      tr2.appendChild(tdEl);
    });
    return tr2;
  }

  tbody.appendChild(wkRow2('NOOS Sales',d=>d.all_cy>0?fmt(d.noos_cy):'<span class="na">—</span>','bold'));
  tbody.appendChild(wkRow2('Total Sales',d=>d.all_cy>0?fmt(d.all_cy):'<span class="na">—</span>'));
  tbody.appendChild(wkRow2('NOOS %',d=>{
    if(!d.all_cy) return '<span class="na">—</span>';
    const p = d.noos_cy/d.all_cy;
    return `<span style="color:var(--orange)">${fmtPct(p)}</span>`;
  },'orange-row'));
  tbody.appendChild(wkRow2('LFL Growth',d=>{
    if(!d.all_cy) return '<span class="na">—</span>';
    if(!d.noos_py) return '<span class="na">—</span>';
    const lfl = (d.noos_cy/d.noos_py)-1;
    return fmtLfl(lfl);
  },'green-row'));

  t.appendChild(tbody);
  return t;
}

// ─────────────────────────────────────────────────────────────
// Style Tables (Top 20)
// ─────────────────────────────────────────────────────────────
function buildStyleTable(styles,totalNoos,isCY,CY){
  // Load stock from localStorage
  let stockMap = {};
  try{
    const raw = localStorage.getItem('logDash_raw');
    if(raw){
      const parsed = JSON.parse(raw);
      (parsed||[]).forEach(s=>{
        if(s.l&&s.g!=null&&s.g!=='DEF'&&s.g!=='UNI'){
          stockMap[String(s.l).trim().toUpperCase()] = Number(s.g)||0;
        }
      });
    }
  }catch(e){}

  const saleKey = isCY?'sale_cy':'sale_all';
  const qtyKey  = isCY?'qty_cy':'qty_all';

  const t = el('table');
  const thead = el('thead');
  const hr = el('tr');
  ['#','TYPE','STYLE','DESIGN','COLOR','SALES (RM)','QTY','NOOS %','AVG SALE','STOCK'].forEach((h,i)=>{
    const thEl = el('th');
    thEl.textContent = h;
    if(i<=1) thEl.style.textAlign='left';
    hr.appendChild(thEl);
  });
  thead.appendChild(hr);
  t.appendChild(thead);

  const tbody = el('tbody');
  let totalSale=0,totalQty=0,totalStock=0;

  styles.forEach((s,i)=>{
    const sale = s[saleKey]||0;
    const qty  = s[qtyKey]||0;
    const avgSale = qty>0?sale/qty:0;
    const noosPct = totalNoos>0?sale/totalNoos:0;
    const stock = stockMap[s.style.trim().toUpperCase()]||0;
    totalSale+=sale; totalQty+=qty; totalStock+=stock;

    const tr2 = el('tr');
    tdLeft(tr2,String(i+1));
    const typeTd = el('td');
    typeTd.innerHTML = s.isSacoor
      ? '<span class="badge-sac">Brothers</span>'
      : '<span class="badge-out">Outlet</span>';
    tr2.appendChild(typeTd);
    tdLeft(tr2,s.style);
    tdLeft(tr2,s.design);
    tdLeft(tr2,s.color);
    td(tr2,fmtRM(sale));
    td(tr2,fmt(qty));
    td(tr2,`<span style="color:var(--orange)">${fmtPct(noosPct)}</span>`,{innerHTML:true});
    td(tr2,fmtRM(avgSale));
    td(tr2,stock>0?fmt(stock):'—');
    tbody.appendChild(tr2);
  });

  // Total row
  const tot = el('tr',{class:'grand-total'});
  tdLeft(tot,'');
  tdLeft(tot,'');
  tdLeft(tot,'TOTAL');
  tdLeft(tot,'');
  tdLeft(tot,'');
  td(tot,fmtRM(totalSale));
  td(tot,fmt(totalQty));
  td(tot,'100%');
  td(tot,'');
  td(tot,totalStock>0?fmt(totalStock):'—');
  tbody.appendChild(tot);

  t.appendChild(tbody);
  return t;
}

// ─────────────────────────────────────────────────────────────
// Family Table
// ─────────────────────────────────────────────────────────────
function buildFamilyTable(famMap,activeMonths){
  const t = el('table');
  const thead = el('thead');
  const hr = el('tr');
  th(hr,'DESIGN',{style:'text-align:left;min-width:160px'});
  activeMonths.forEach(m=>{
    const prevLabel = m===1?'DEC':MONTHS[m-2];
    th(hr,`${MONTHS[m-1]}<br><span style="font-size:.6rem;font-weight:400;color:rgba(255,255,255,.5)">vs ${prevLabel}</span>`,{innerHTML:true});
  });
  th(hr,'YTD');
  thead.appendChild(hr);
  t.appendChild(thead);

  const tbody = el('tbody');

  // Separate outlet and sacoor entries
  const entries = Object.values(famMap);
  const outEntries = entries.filter(e=>!e.isSacoor).sort((a,b)=>a.design.localeCompare(b.design));
  const sacEntries = entries.filter(e=>e.isSacoor).sort((a,b)=>a.design.localeCompare(b.design));

  function addSectionHeader(label){
    const tr2 = el('tr',{class:'subtotal'});
    const td2 = el('td');
    td2.setAttribute('colspan',activeMonths.length+2);
    td2.style.fontWeight='800';
    td2.style.fontSize='.72rem';
    td2.style.letterSpacing='.07em';
    td2.style.textTransform='uppercase';
    td2.style.color='#2a6040';
    td2.textContent=label;
    tr2.appendChild(td2);
    tbody.appendChild(tr2);
  }

  function subtotals(ents){
    const sub = {};
    ents.forEach(e=>{
      Object.entries(e.months).forEach(([m,v])=>{ sub[m]=(sub[m]||0)+v; });
    });
    return sub;
  }

  function addRows(ents,label){
    const sub = subtotals(ents);
    addSectionHeader(label);
    ents.forEach(e=>addDesignRow(e));
    // subtotal
    const str = el('tr',{class:'subtotal'});
    tdLeft(str,`${label} Subtotal`,{style:'font-size:.78rem'});
    let ytd=0;
    activeMonths.forEach(m=>{
      const v=sub[m]||0; const prev=sub[m===1?0:m-1]||0;
      ytd+=v;
      td(str,momCell(v,prev),{innerHTML:true});
    });
    td(str,fmtRM(ytd));
    tbody.appendChild(str);
  }

  function addDesignRow(e){
    const tr2 = el('tr');
    tdLeft(tr2,e.design);
    let ytd=0;
    activeMonths.forEach(m=>{
      const v=e.months[m]||0;
      const prev=e.months[m===1?0:m-1]||0;
      ytd+=v;
      td(tr2,momCell(v,prev),{innerHTML:true});
    });
    td(tr2,fmtRM(ytd));
    tbody.appendChild(tr2);
  }

  function momCell(curr,prev){
    if(!curr&&!prev) return '<span class="na">—</span>';
    const val = fmtRM(curr);
    if(!prev||prev===0) return val;
    const chg = (curr-prev)/prev;
    const arrow = chg>0?`<span class="pos"> ▲${(chg*100).toFixed(1)}%</span>`:
                  chg<0?`<span class="neg"> ▼${(Math.abs(chg)*100).toFixed(1)}%</span>`:
                  '<span class="na"> —</span>';
    return val+arrow;
  }

  // All entries grand totals
  const allSub = subtotals(entries);

  addRows(outEntries,'Outlet');
  addRows(sacEntries,'Sacoor');

  // Grand total
  const gtr = el('tr',{class:'grand-total'});
  tdLeft(gtr,'GRAND TOTAL');
  let grandYtd=0;
  activeMonths.forEach(m=>{
    const v=allSub[m]||0; const prev=allSub[m===1?0:m-1]||0;
    grandYtd+=v;
    td(gtr,momCell(v,prev),{innerHTML:true});
  });
  td(gtr,fmtRM(grandYtd));
  tbody.appendChild(gtr);

  t.appendChild(tbody);
  return t;
}

// ─────────────────────────────────────────────────────────────
// DOM helpers
// ─────────────────────────────────────────────────────────────
function el(tag,attrs){
  const e = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='innerHTML') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  return e;
}
function elText(tag,text,attrs){
  const e = el(tag,attrs);
  e.textContent=text;
  return e;
}
function th(parent,content,attrs,prepend){
  const e = el('th',attrs);
  if(attrs&&attrs.innerHTML) e.innerHTML=content; else e.textContent=content;
  if(prepend) parent.insertBefore(e,parent.firstChild); else parent.appendChild(e);
  return e;
}
function td(parent,content,attrs,prepend){
  const e = el('td');
  if(attrs&&attrs.innerHTML) e.innerHTML=content; else e.textContent=content;
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='innerHTML') return;
    if(k==='class') e.className=v; else e.setAttribute(k,v);
  });
  if(prepend) parent.insertBefore(e,parent.firstChild); else parent.appendChild(e);
  return e;
}
function tdLeft(parent,content,attrs,prepend){
  return td(parent,content,{...(attrs||{}),style:'text-align:left;font-weight:500;'+(attrs&&attrs.style?attrs.style:'')},prepend);
}

// Restore Totals
// ─────────────────────────────────────────────────────────────
function restoreTotals(){
  if(G.rows){ buildDashboard(G.rows); }
}

document.addEventListener('DOMContentLoaded', init);
