{% extends "base.html" %}
{% block title %}Change PIN{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Change PIN</h1>
  <a href="{{ '/logistics' if session.is_admin else '/store' }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:420px">
  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success">{{ success }}</div>
  {% endif %}

  <form method="post" action="/change-pin">
    <div class="form-group">
      <label>Current PIN</label>
      <input type="password" name="current_pin" required placeholder="••••"/>
    </div>
    <div class="form-group">
      <label>New PIN</label>
      <input type="password" name="new_pin" required placeholder="Minimum 4 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm New PIN</label>
      <input type="password" name="confirm_pin" required placeholder="Repeat PIN"/>
    </div>
    <button type="submit" class="btn btn-primary">Change PIN</button>
  </form>
</div>
{% endblock %}
