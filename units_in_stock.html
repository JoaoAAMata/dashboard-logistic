<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Units in Stock</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f0eeeb;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --brothers:#185FA5;--outlet:#1D9E75;--blue:#BA7517;--projects:#534AB7;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border2);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);text-decoration:none;padding:5px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);transition:all .12s}
.back-btn:hover{color:var(--text)}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-badge{font-size:11px;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:99px}
.upload-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.upload-btn:hover{opacity:.82}
#file-input{display:none}
.main{max-width:1400px;margin:0 auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}
.section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}


/* TOP BANNER */
.banner{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.brand-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.brand-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.brand-card.brothers::before{background:var(--brothers)}
.brand-card.outlet::before{background:var(--outlet)}
.brand-card.blue::before{background:var(--blue)}
.brand-card.projects::before{background:var(--projects)}
.brand-card-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.brand-card-value{font-size:32px;font-weight:600;line-height:1.1;color:var(--text)}
.brand-card-pct{font-size:12px;color:var(--text2)}
.brand-card-bar{height:4px;border-radius:2px;background:var(--surface2);overflow:hidden;margin-top:6px}
.brand-card-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* TOTAL CARD */
.total-row{background:var(--surface2);border-radius:var(--radius);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.total-left{display:flex;flex-direction:column;gap:3px}
.total-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.total-val{font-size:38px;font-weight:600;line-height:1;color:var(--text)}
.total-sub{font-size:12px;color:var(--text2)}
.total-right{display:flex;gap:24px}
.total-stat{text-align:right}
.total-stat-lbl{font-size:11px;color:var(--text3);margin-bottom:2px}
.total-stat-val{font-size:18px;font-weight:600;color:var(--text)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}

/* STACKED BAR BRAND */
.stacked-bar-wrap{display:flex;flex-direction:column;gap:14px;margin-top:4px}
.sb-row{display:flex;flex-direction:column;gap:5px}
.sb-label{display:flex;justify-content:space-between;align-items:center}
.sb-name{font-size:12px;font-weight:500;color:var(--text)}
.sb-val{font-size:12px;color:var(--text2)}
.sb-track{height:10px;border-radius:99px;background:var(--surface2);overflow:hidden}
.sb-fill{height:100%;border-radius:99px;transition:width .5s ease}
.sb-pct{font-size:11px;color:var(--text3);margin-top:1px}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut-canvas{position:relative;width:160px;height:160px;flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1}
.dl-row{display:flex;align-items:center;gap:8px}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dl-name{font-size:12px;color:var(--text2);flex:1}
.dl-val{font-size:12px;font-weight:600;color:var(--text)}
.dl-pct{font-size:11px;color:var(--text3);min-width:34px;text-align:right}

/* GENDER SPLIT */
.gender-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:4px}
.gen-card{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px}
.gen-lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.gen-val{font-size:18px;font-weight:600;color:var(--text)}
.gen-pct{font-size:11px;color:var(--text2);margin-top:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Back</a>
    <span class="topbar-title">Units in Stock</span>
  </div>
  <div class="topbar-right">
    <span class="date-badge" id="date-lbl"></span>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v8M5 5l3-3 3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      Update Data
    </button>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="loadExcel(event)">
  </div>
</div>

<div class="main">

  <!-- TOTAL -->
  <div class="total-row">
    <div class="total-left">
      <div class="total-lbl">Total Units in Stock</div>
      <div class="total-val" id="total-val">—</div>
      <div class="total-sub" id="total-sub">—</div>
    </div>
    <div class="total-right">
      <div class="total-stat">
        <div class="total-stat-lbl">Brands</div>
        <div class="total-stat-val">3 + Projects</div>
      </div>
      <div class="total-stat">
        <div class="total-stat-lbl">Largest brand</div>
        <div class="total-stat-val" id="largest-brand">—</div>
      </div>
      <div class="total-stat">
        <div class="total-stat-lbl">Smallest brand</div>
        <div class="total-stat-val" id="smallest-brand">—</div>
      </div>
    </div>
  </div>

  <!-- BRAND CARDS -->
  <div>
    <div class="section-label">Stock by Brand</div>
    <div class="banner">
      <div class="brand-card brothers">
        <div class="brand-card-label">Brothers</div>
        <div class="brand-card-value" id="kpi-brothers">—</div>
        <div class="brand-card-pct" id="pct-brothers">—</div>
        <div class="brand-card-bar"><div class="brand-card-fill" id="bar-brothers" style="background:var(--brothers);width:0"></div></div>
      </div>
      <div class="brand-card outlet">
        <div class="brand-card-label">Outlet</div>
        <div class="brand-card-value" id="kpi-outlet">—</div>
        <div class="brand-card-pct" id="pct-outlet">—</div>
        <div class="brand-card-bar"><div class="brand-card-fill" id="bar-outlet" style="background:var(--outlet);width:0"></div></div>
      </div>
      <div class="brand-card blue">
        <div class="brand-card-label">Blue</div>
        <div class="brand-card-value" id="kpi-blue">—</div>
        <div class="brand-card-pct" id="pct-blue">—</div>
        <div class="brand-card-bar"><div class="brand-card-fill" id="bar-blue" style="background:var(--blue);width:0"></div></div>
      </div>
      <div class="brand-card projects">
        <div class="brand-card-label">Projects</div>
        <div class="brand-card-value" id="kpi-projects">—</div>
        <div class="brand-card-pct" id="pct-projects">—</div>
        <div class="brand-card-bar"><div class="brand-card-fill" id="bar-projects" style="background:var(--projects);width:0"></div></div>
      </div>
    </div>
  </div>

  <!-- TWO COL: donut + bars -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">Brand distribution</div>
      <div class="donut-wrap">
        <div class="donut-canvas"><canvas id="donutChart"></canvas></div>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Stock volume per brand</div>
      <div class="stacked-bar-wrap" id="brand-bars"></div>
    </div>
  </div>

  <!-- GENDER SPLIT -->
  <div class="card">
    <div class="card-title">Stock by Gender</div>
    <div class="gender-grid" id="gender-grid"></div>
  </div>

</div>

function classifyBrand(storet, marca, colecao) {
  if(colecao==='Projects') return 'Projects';
  if(storet==='Sacoor') return 'Brothers';
  if(['Blue','BlueOut','One'].includes(storet)) return 'Blue';
  if(['Club','Outlet'].includes(storet)) return 'Outlet';
  if(['SacoorOnl','Warehouse'].includes(storet)) {
    if(['OUTLET','KIDS'].includes(marca)) return 'Outlet';
    if(['ONE','BLUE'].includes(marca)) return 'Blue';
    if(marca==='SACOOR') {
      if(['NOOS','Collection'].includes(colecao)) return 'Brothers';
      if(['Leftovers','Cleaning 1','Cleaning 2'].includes(colecao)) return 'Outlet';
    }
  }
  return null;
}

function processRows(rows, fname) {
  const df = rows.filter(r=>(r.STOCK||0)>0 && r.STORET!=='Special' && !EXCL_CATS.includes(r.Categoria));
  df.forEach(r=>{ r._brand=classifyBrand(r.STORET,r.Marca,r.Colecao); });
  const valid=df.filter(r=>r._brand);
  const byBrand={};
  valid.forEach(r=>{ byBrand[r._brand]=(byBrand[r._brand]||0)+r.STOCK; });
  DATA.kpi={Brothers:byBrand.Brothers||0,Outlet:byBrand.Outlet||0,Blue:byBrand.Blue||0,Projects:byBrand.Projects||0};
  const CATS=['Collection','NOOS','Leftovers','Cleaning 1','Cleaning 2','Projects'];
  DATA.cat={};
  CATS.forEach(cat=>{ DATA.cat[cat]={Brothers:0,Outlet:0,Blue:0,Projects:0}; });
  valid.forEach(r=>{
    const cat=r.Colecao,b=r._brand;
    if(!DATA.cat[cat]) DATA.cat[cat]={Brothers:0,Outlet:0,Blue:0,Projects:0};
    DATA.cat[cat][b]=(DATA.cat[cat][b]||0)+r.STOCK;
  });
  const refMap={};
  valid.forEach(r=>{
    const k=[r._brand,r.Categoria,r.Genero,r.Loja].join('|');
    refMap[k]=(refMap[k]||0)+r.STOCK;
  });
  DATA.refs=Object.entries(refMap).map(([k,v])=>{
    const[marca,cat,gen,loja]=k.split('|'); return{marca,cat,gen,loja,stock:v};
  }).sort((a,b)=>b.stock-a.stock).slice(0,800);
  DATA.lojas=[...new Set(valid.map(r=>r.Loja).filter(Boolean))].sort();
  const top10={};
  ['Brothers','Outlet','Blue'].forEach(b=>{
    const sub=valid.filter(r=>r._brand===b);
    const m={};
    sub.forEach(r=>{ const k=[r.Categoria,r.Genero].join('|'); m[k]=(m[k]||0)+r.STOCK; });
    const refs=Object.entries(m).map(([k,v])=>{const[cat,gen]=k.split('|');return{cat,gen,stock:v};})
      .sort((a,b2)=>b2.stock-a.stock).slice(0,10);
    top10[b]={total:byBrand[b]||0,refs};
  });

}

      const ws=wb.Sheets[wb.SheetNames[0]];
      processRows(XLSX.utils.sheet_to_json(ws,{defval:''}), file.name);
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsBinaryString(file);
}

let donutInst = null;

function renderAll() {
  document.getElementById('date-lbl').textContent = DATA.date || '';
  renderKPI();
  renderDonut();
  renderBars();
  renderGender();
}

function renderKPI() {
  const k = DATA.kpi;
  const BRANDS = ['Brothers','Outlet','Blue','Projects'];
  const total = BRANDS.reduce((s,b)=>s+(k[b]||0),0);
  document.getElementById('total-val').textContent = fmtN(total);
  document.getElementById('total-sub').textContent = '31 March 2026 · Brothers + Outlet + Blue + Projects';

  const sorted = BRANDS.filter(b=>b!=='Projects').sort((a,b2)=>(k[b2]||0)-(k[a]||0));
  document.getElementById('largest-brand').textContent = sorted[0] || '—';
  document.getElementById('smallest-brand').textContent = sorted[sorted.length-1] || '—';

  [['brothers','Brothers'],['outlet','Outlet'],['blue','Blue'],['projects','Projects']].forEach(([id,key])=>{
    const val=k[key]||0, pct=total?((val/total)*100).toFixed(1):0;
    document.getElementById('kpi-'+id).textContent = fmtN(val);
    document.getElementById('pct-'+id).textContent = pct+'% of total stock';
    document.getElementById('bar-'+id).style.width = pct+'%';
  });
}

function renderDonut() {
  const k=DATA.kpi;
  const BRANDS=[['Brothers','#185FA5'],['Outlet','#1D9E75'],['Blue','#BA7517'],['Projects','#534AB7']];
  const total=BRANDS.reduce((s,[b])=>s+(k[b]||0),0);
  const vals=BRANDS.map(([b])=>k[b]||0);

  if(donutInst) donutInst.destroy();
  donutInst = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{
      labels:BRANDS.map(([b])=>b),
      datasets:[{data:vals,backgroundColor:BRANDS.map(([,c])=>c),borderWidth:0,hoverOffset:4}]
    },
    options:{
      responsive:true,maintainAspectRatio:true,cutout:'68%',
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:ctx=>` ${fmtN(ctx.raw)} units (${total?((ctx.raw/total)*100).toFixed(1):0}%)`
      }}}
    }
  });

  document.getElementById('donut-legend').innerHTML = BRANDS.map(([b,c],i)=>{
    const pct=total?((vals[i]/total)*100).toFixed(1):0;
    return `<div class="dl-row">
      <div class="dl-dot" style="background:${c}"></div>
      <div class="dl-name">${b}</div>
      <div class="dl-val">${fmtN(vals[i])}</div>
      <div class="dl-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderBars() {
  const k=DATA.kpi;
  const BRANDS=[['Brothers','#185FA5'],['Outlet','#1D9E75'],['Blue','#BA7517'],['Projects','#534AB7']];
  const max=Math.max(...BRANDS.map(([b])=>k[b]||0),1);
  const total=BRANDS.reduce((s,[b])=>s+(k[b]||0),0);
  document.getElementById('brand-bars').innerHTML = BRANDS.map(([b,c])=>{
    const val=k[b]||0, pct=total?((val/total)*100).toFixed(1):0;
    const w=Math.round(val/max*100);
    return `<div class="sb-row">
      <div class="sb-label"><span class="sb-name">${b}</span><span class="sb-val">${fmtN(val)} units</span></div>
      <div class="sb-track"><div class="sb-fill" style="width:${w}%;background:${c}"></div></div>
      <div class="sb-pct">${pct}% of total</div>
    </div>`;
  }).join('');
}

function renderGender() {
  const refs = DATA.refs;
  const genMap = {};
  refs.forEach(r=>{ genMap[r.gen]=(genMap[r.gen]||0)+r.stock; });
  const total = Object.values(genMap).reduce((s,v)=>s+v,0);
  const GENS = [
    ['S MAN','Man','#185FA5'],
    ['S WOMAN','Woman','#D85A30'],
    ['S PACKAGE','Package','#888780'],
    ['S UNISEX','Unisex','#534AB7'],
    ['S KIDS BOY','Kids Boy','#1D9E75'],
    ['S KIDS GIRL','Kids Girl','#BA7517'],
  ].filter(([key])=>genMap[key]);

  document.getElementById('gender-grid').innerHTML = GENS.map(([key,lbl,c])=>{
    const val=genMap[key]||0, pct=total?((val/total)*100).toFixed(1):0;
    return `<div class="gen-card">
      <div class="gen-lbl" style="color:${c}">${lbl}</div>
      <div class="gen-val">${fmtN(val)}</div>
      <div class="gen-pct">${pct}% of total</div>
    </div>`;
  }).join('');
}

renderAll();
</script>
</body></html>
