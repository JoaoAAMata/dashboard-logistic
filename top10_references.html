:root{

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border2);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);text-decoration:none;padding:5px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);transition:all .12s}
.back-btn:hover{color:var(--text)}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-badge{font-size:11px;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:99px}
.upload-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.upload-btn:hover{opacity:.82}
#file-input{display:none}
.main{max-width:1400px;margin:0 auto;padding:22px 28px;display:flex;flex-direction:column;gap:20px}
.section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.m-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.pill-ok{background:#EAF3DE;color:#3B6D11}
.pill-low{background:#FAEEDA;color:#854F0B}
.pill-bad{background:#FCEBEB;color:#A32D2D}

.top10-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.t10-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.t10-head{padding:13px 16px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.t10-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.t10-dot{width:8px;height:8px;border-radius:50%}
.t10-sum{text-align:right}
.t10-pct{font-size:18px;font-weight:600;line-height:1}
.t10-lbl{font-size:10px;color:var(--text3);margin-top:2px}
table.t10t{width:100%;border-collapse:collapse;table-layout:fixed}
table.t10t thead th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;text-align:left;border-bottom:.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.t10t thead th.r{text-align:right}
table.t10t tbody td{font-size:11px;padding:7px 12px;border-bottom:.5px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.t10t tbody td.r{text-align:right}
table.t10t tbody td.mu{color:var(--text3);font-size:10px}
table.t10t tbody tr:last-child td{border-bottom:none}
table.t10t tfoot td{font-size:11px;font-weight:600;padding:8px 12px;background:var(--surface2)}
table.t10t tfoot td.r{text-align:right}
.bar-wrap{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.mini-bar{width:40px;height:4px;border-radius:2px;background:var(--border);overflow:hidden;flex-shrink:0}
.mini-fill{height:100%;border-radius:2px}
.pct-txt{font-size:11px;font-weight:600;min-width:36px;text-align:right}
</style>
</head>

const EXCL_CATS = ['Package','Package Premium'];
let DATA = INIT_DATA;
function fmtN(n){ return Number(n).toLocaleString('en-MY'); }

function classifyBrand(storet, marca, colecao) {
  if(colecao==='Projects') return 'Projects';
  if(storet==='Sacoor') return 'Brothers';
  if(['Blue','BlueOut','One'].includes(storet)) return 'Blue';
  if(['Club','Outlet'].includes(storet)) return 'Outlet';
  if(['SacoorOnl','Warehouse'].includes(storet)) {
    if(['OUTLET','KIDS'].includes(marca)) return 'Outlet';
    if(['ONE','BLUE'].includes(marca)) return 'Blue';
    if(marca==='SACOOR') {
      if(['NOOS','Collection'].includes(colecao)) return 'Brothers';
      if(['Leftovers','Cleaning 1','Cleaning 2'].includes(colecao)) return 'Outlet';
    }
  }
  return null;
}

function processRows(rows, fname) {
  const df = rows.filter(r=>(r.STOCK||0)>0 && r.STORET!=='Special' && !EXCL_CATS.includes(r.Categoria));
  df.forEach(r=>{ r._brand=classifyBrand(r.STORET,r.Marca,r.Colecao); });
  const valid=df.filter(r=>r._brand);
  const byBrand={};
  valid.forEach(r=>{ byBrand[r._brand]=(byBrand[r._brand]||0)+r.STOCK; });
  DATA.kpi={Brothers:byBrand.Brothers||0,Outlet:byBrand.Outlet||0,Blue:byBrand.Blue||0,Projects:byBrand.Projects||0};
  const CATS=['Collection','NOOS','Leftovers','Cleaning 1','Cleaning 2','Projects'];
  DATA.cat={};
  CATS.forEach(cat=>{ DATA.cat[cat]={Brothers:0,Outlet:0,Blue:0,Projects:0}; });
  valid.forEach(r=>{
    const cat=r.Colecao,b=r._brand;
    if(!DATA.cat[cat]) DATA.cat[cat]={Brothers:0,Outlet:0,Blue:0,Projects:0};
    DATA.cat[cat][b]=(DATA.cat[cat][b]||0)+r.STOCK;
  });
  const refMap={};
  valid.forEach(r=>{
    const k=[r._brand,r.Categoria,r.Genero,r.Loja].join('|');
    refMap[k]=(refMap[k]||0)+r.STOCK;
  });
  DATA.refs=Object.entries(refMap).map(([k,v])=>{
    const[marca,cat,gen,loja]=k.split('|'); return{marca,cat,gen,loja,stock:v};
  }).sort((a,b)=>b.stock-a.stock).slice(0,800);
  DATA.lojas=[...new Set(valid.map(r=>r.Loja).filter(Boolean))].sort();
  const top10={};
  ['Brothers','Outlet','Blue'].forEach(b=>{
    const sub=valid.filter(r=>r._brand===b);
    const m={};
    sub.forEach(r=>{ const k=[r.Categoria,r.Genero].join('|'); m[k]=(m[k]||0)+r.STOCK; });
    const refs=Object.entries(m).map(([k,v])=>{const[cat,gen]=k.split('|');return{cat,gen,stock:v};})
      .sort((a,b2)=>b2.stock-a.stock).slice(0,10);
    top10[b]={total:byBrand[b]||0,refs};
  });
  DATA.top10=top10;
  const m=fname.match(/(\d{8})/);
  if(m){const s=m[1];DATA.date=s.slice(6)+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(s.slice(4,6))-1]+' '+s.slice(0,4);}
  else DATA.date=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('date-lbl').textContent=DATA.date||'';
  renderAll();
}

function loadExcel(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      processRows(XLSX.utils.sheet_to_json(ws,{defval:''}), file.name);
    }catch(err){alert('Error: '+err.message);}
  };
  reader.readAsBinaryString(file);
}

function renderAll() {
  document.getElementById('date-lbl').textContent=DATA.date||'';
  renderTop10();
}
function renderTop10() {
  const BRANDS3=[['Brothers','#185FA5'],['Outlet','#1D9E75'],['Blue','#BA7517']];
  document.getElementById('top10-grid').innerHTML=BRANDS3.map(([key,cor])=>{
    const d=DATA.top10[key]||{total:0,refs:[]};
    const sum10=d.refs.reduce((s,r)=>s+r.stock,0);
    const pct10=d.total?Math.round(sum10/d.total*100):0;
    const maxS=d.refs[0]?.stock||1;
    const rows=d.refs.length===0
      ?`<tr><td colspan="4" style="text-align:center;padding:1.5rem;color:var(--text3)">No data</td></tr>`
      :d.refs.map((r,i)=>{
        const p=d.total?(r.stock/d.total*100).toFixed(1):'0.0';
        const bw=Math.round(r.stock/maxS*100);
        return `<tr>
          <td class="mu">${i+1}</td>
          <td>${r.cat}</td><td>${r.gen}</td>
          <td class="r">
            <div class="bar-wrap"><div class="mini-bar"><div class="mini-fill" style="width:${bw}%;background:${cor}"></div></div><span class="pct-txt" style="color:${cor}">${p}%</span></div>
            <div style="font-size:11px;font-weight:600;text-align:right;margin-top:2px">${fmtN(r.stock)}</div>
          </td>
        </tr>`;
      }).join('');
    return `<div class="t10-card">
      <div class="t10-head">
        <div class="t10-title"><div class="t10-dot" style="background:${cor}"></div>${key}</div>
        <div class="t10-sum"><div class="t10-pct" style="color:${cor}">${pct10}%</div><div class="t10-lbl">top 10 vs brand stock</div></div>
      </div>
      <table class="t10t">
        <thead><tr><th style="width:20px">#</th><th>Category</th><th>Gender</th><th class="r">Stock / % Brand</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td colspan="3">Top 10 total — ${fmtN(sum10)} units</td><td class="r">${pct10}%</td></tr></tfoot>
      </table>
    </div>`;
  }).join('');
}
